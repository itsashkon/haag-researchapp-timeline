<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HAAG Recruitment Status</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
  :root {
    --navy: #0B3954;
    --teal: #087E8B;
    --mint: #5DD9C1;
    --ink: #17242B;
    --mute: #5B6B72;
    --card-tint: #EAF6F6;
    --white: #FFFFFF;
    --amber: #C97A1A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Calibri, "Segoe UI", Arial, sans-serif;
    background: var(--white);
    color: var(--ink);
  }
  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  h1 {
    font-family: Cambria, Georgia, serif;
    color: var(--navy);
    font-size: 34px;
    margin: 0 0 6px;
  }
  .subtitle {
    color: var(--teal);
    font-style: italic;
    font-size: 15px;
    margin: 0 0 28px;
  }
  .status-banner {
    background: var(--navy);
    border-radius: 12px;
    padding: 24px 28px;
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 12px;
  }
  .status-banner .label {
    font-size: 13px;
    color: #AFC9D2;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .status-banner .phase {
    font-size: 24px;
    font-weight: bold;
  }
  .status-banner .cycle {
    font-size: 13px;
    color: var(--mint);
  }
  .updated {
    font-size: 12px;
    color: var(--mute);
    margin-bottom: 32px;
  }
  .notes {
    background: var(--card-tint);
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 40px;
    border-left: 4px solid var(--teal);
  }
  .timeline {
    position: relative;
    margin: 0 0 40px;
  }
  .phase-row {
    display: flex;
    gap: 20px;
    position: relative;
    padding-bottom: 32px;
  }
  .phase-row:last-child { padding-bottom: 0; }
  .rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 32px;
  }
  .dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: var(--white);
    background: #C9D6DA;
    z-index: 1;
  }
  .dot.complete { background: var(--teal); }
  .dot.current {
    background: var(--navy);
    box-shadow: 0 0 0 4px var(--card-tint), 0 0 0 6px var(--teal);
  }
  .line {
    width: 3px;
    flex: 1;
    background: #DCE7E9;
    margin-top: 2px;
  }
  .line.complete { background: var(--teal); }
  .phase-content { padding-top: 2px; }
  .phase-label {
    font-size: 16px;
    font-weight: bold;
    color: var(--mute);
  }
  .phase-row.current .phase-label { color: var(--navy); }
  .phase-row.complete .phase-label { color: var(--teal); }
  .phase-desc {
    font-size: 13px;
    color: var(--mute);
    margin-top: 4px;
    max-width: 560px;
  }
  .badge {
    display: inline-block;
    font-size: 10.5px;
    font-weight: bold;
    padding: 2px 9px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .badge.current { background: var(--mint); color: var(--navy); }
  .badge.complete { background: var(--card-tint); color: var(--teal); }
  .contact {
    border-top: 1px solid #E5EDEF;
    padding-top: 20px;
    font-size: 13px;
    color: var(--mute);
  }
  .contact a { color: var(--teal); font-weight: bold; text-decoration: none; }
  .contact a:hover { text-decoration: underline; }
  .error {
    background: #FBEAEA;
    border-left: 4px solid #C0392B;
    padding: 16px 20px;
    border-radius: 8px;
    font-size: 14px;
    color: #7A1F1F;
  }
  .loading { color: var(--mute); font-size: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>HAAG Recruitment Status</h1>
    <p class="subtitle">Where we currently stand in the recruitment cycle</p>
    <div id="content">
      <p class="loading">Loading current status&hellip;</p>
    </div>
  </div>

  <script>
    async function loadStatus() {
      const contentEl = document.getElementById("content");
      try {
        const res = await fetch("recruitment.yml", { cache: "no-store" });
        if (!res.ok) throw new Error("Could not load recruitment.yml (" + res.status + ")");
        const text = await res.text();
        const data = jsyaml.load(text);
        render(data, contentEl);
      } catch (err) {
        contentEl.innerHTML =
          '<div class="error"><strong>Could not load recruitment status.</strong><br>' +
          "This page needs to be served over HTTP (e.g. GitHub Pages or a local server) " +
          "rather than opened directly as a file, since it fetches <code>recruitment.yml</code>. " +
          "<br><br>Details: " + (err.message || err) + "</div>";
      }
    }

    function render(data, el) {
      const phases = data.phases || [];
      const currentIndex = phases.findIndex((p) => p.key === data.current_phase);
      const currentPhase = phases[currentIndex];

      let html = "";

      // Status banner
      html += '<div class="status-banner">';
      html += '<div><div class="label">Current Phase</div>';
      html += '<div class="phase">' + escapeHtml(currentPhase ? currentPhase.label : data.current_phase) + "</div></div>";
      html += '<div class="cycle">' + escapeHtml(data.cycle_name || "") + "</div>";
      html += "</div>";

      html += '<div class="updated">Last updated: ' + escapeHtml(data.last_updated || "unknown") + "</div>";

      if (data.notes) {
        html += '<div class="notes">' + escapeHtml(data.notes.trim()) + "</div>";
      }

      // Timeline
      html += '<div class="timeline">';
      phases.forEach((p, i) => {
        let state = "upcoming";
        if (i < currentIndex) state = "complete";
        else if (i === currentIndex) state = "current";

        const isLast = i === phases.length - 1;
        html += '<div class="phase-row ' + state + '">';
        html += '<div class="rail">';
        html += '<div class="dot ' + state + '">' + (state === "complete" ? "&#10003;" : i + 1) + "</div>";
        if (!isLast) html += '<div class="line ' + (state === "complete" ? "complete" : "") + '"></div>';
        html += "</div>";
        html += '<div class="phase-content">';
        html += '<span class="phase-label">' + escapeHtml(p.label) + "</span>";
        if (state === "current") html += '<span class="badge current">CURRENT</span>';
        if (state === "complete") html += '<span class="badge complete">COMPLETE</span>';
        html += '<div class="phase-desc">' + escapeHtml(p.description || "") + "</div>";
        html += "</div></div>";
      });
      html += "</div>";

      // Contact
      if (data.contact) {
        html += '<div class="contact">Questions about this cycle? <a href="' + escapeAttr(data.contact) + '">Contact HAAG</a></div>';
      }

      el.innerHTML = html;
    }

    function escapeHtml(str) {
      if (str === null || str === undefined) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
    function escapeAttr(str) {
      return String(str).replace(/"/g, "&quot;");
    }

    loadStatus();
  </script>
</body>
</html>
